<!DOCTYPE html>
<html>
<head>
  <title>immdes - Index of /</title>
  <style>
    body { font-family: "Lucida Console", Monaco, monospace; background: #f8f8f8; margin: 0; padding: 20px; }
    .header { background: #fff; border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; }
    .header h1 { margin: 0 0 10px 0; font-size: 18px; color: #333; }
    .header p { margin: 0; color: #666; font-size: 13px; }
    table { width: 100%; background: #fff; border-collapse: collapse; border: 1px solid #ddd; }
    th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f5f5f5; font-weight: normal; color: #333; }
    .name { font-weight: bold; }
    .date { color: #666; font-size: 12px; }
    .size { color: #999; font-size: 12px; text-align: right; }
    a { color: #0066cc; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .loading { color: #999; font-style: italic; }
    .parent { font-size: 13px; background: #f9f9f9; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Index of /immdes/</h1>
    <p>Apache-style directory listing for weekly snapshots (2026-01-01 to 2026-05-30)</p>
  </div>
  
  <table>
    <thead>
      <tr><th>Name</th><th>Last Modified</th><th>Size</th></tr>
    </thead>
    <tbody id="listing">
      <tr><td colspan="3" class="loading">Scanning dated folders...</td></tr>
    </tbody>
  </table>

  <script>
    const dates = [];
    for(let month=1; month<=5; month++) {
      const daysInMonth = month === 2 ? 28 : (month === 4 || month === 5 ? 30 : 31);
      for(let day=1; day<=daysInMonth; day++) {
        dates.push(`2026-${month.toString().padStart(2,'0')}-${day.toString().padStart(2,'0')}`);
      }
    }
    
    const tbody = document.getElementById('listing');
    let foundCount = 0;
    
    dates.slice().reverse().slice(0, 150).forEach(date => {
      const url = `./${date}/`;
      fetch(url, {method: 'HEAD', cache: 'no-cache'}).then(r => {
        if(r.ok) {
          foundCount++;
          const row = tbody.insertRow(0);  // Newest first
          row.innerHTML = `
            <td class="name"><a href="${url}">${date}/</a></td>
            <td class="date">${new Date().toLocaleString()}</td>
            <td class="size">-</td>
          `;
        }
      }).catch(() => {});
    });
    
    setTimeout(() => {
      if(foundCount === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="loading">No dated folders found (2026-01-01 to 2026-05-30)</td></tr>';
      }
    }, 8000);
  </script>
</body>
</html>
